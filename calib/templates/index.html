<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PiCrawler Calibration</title>
<style>
 :root { color-scheme: dark; }
 body{font-family:system-ui,sans-serif;background:#111;color:#eee;margin:0;padding:1rem;max-width:760px;margin:auto}
 h2{margin:.2rem 0}
 .bar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin:.6rem 0 1rem}
 button{font-size:1rem;padding:9px 14px;border:0;border-radius:8px;background:#357;color:#fff;cursor:pointer}
 button.warn{background:#a53}
 button.go{background:#2b6;color:#001;font-weight:700}
 #batt{margin-left:auto;font-size:.95rem;color:#9c9}
 #batt.low{color:#f66;font-weight:700}
 .leg{border:1px solid #333;border-radius:10px;padding:.6rem .8rem;margin:.5rem 0;background:#181818}
 .leg h3{margin:.2rem 0 .5rem;font-size:1rem;color:#8cf}
 .row{display:grid;grid-template-columns:120px 1fr 46px;gap:10px;align-items:center;margin:.35rem 0}
 .row label{font-size:.85rem;color:#bbb}
 input[type=range]{width:100%}
 .val{font-variant-numeric:tabular-nums;text-align:right}
 .hint{font-size:.8rem;color:#888;margin:.4rem 0 0}
</style>
</head>
<body>
<h2>🕷️ PiCrawler Calibration</h2>
<div class="hint">Drag a slider to trim that servo (±20°). The robot re-poses to the
neutral stance after each change so you can see it move. Changes save automatically.
Goal: make all four legs symmetric.</div>

<div class="bar">
  <button class="go" onclick="stance()">Neutral stance</button>
  <button onclick="zeroAll()">Zero servos (assembly)</button>
  <button class="warn" onclick="resetAll()">Reset offsets → 0</button>
  <span id="batt">battery: …</span>
</div>

<div id="legs"></div>

<script>
const LABELS = {{ labels|tojson }};
let offsets = new Array(12).fill(0);

function build(){
  const legNames = ["Leg 1 — Front-Right","Leg 2 — Front-Left","Leg 3 — Back-Left","Leg 4 — Back-Right"];
  const root = document.getElementById('legs'); root.innerHTML='';
  for(let L=0; L<4; L++){
    const box=document.createElement('div'); box.className='leg';
    box.innerHTML=`<h3>${legNames[L]}</h3>`;
    for(let j=0; j<3; j++){
      const idx=L*3+j;
      const row=document.createElement('div'); row.className='row';
      row.innerHTML=`<label>servo ${idx} · J${j+1}</label>
        <input type="range" min="-20" max="20" step="0.5" value="${offsets[idx]}"
               oninput="live(${idx},this.value)" onchange="apply(${idx},this.value)">
        <span class="val" id="v${idx}">${(+offsets[idx]).toFixed(1)}</span>`;
      box.appendChild(row);
    }
    root.appendChild(box);
  }
}
function live(idx,v){ document.getElementById('v'+idx).textContent=(+v).toFixed(1); }
async function apply(idx,v){
  const r=await fetch('/api/offset',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({index:idx,value:+v})});
  const j=await r.json(); if(j.offsets){offsets=j.offsets; syncVals();}
}
function syncVals(){ offsets.forEach((o,i)=>{const el=document.getElementById('v'+i); if(el)el.textContent=(+o).toFixed(1);}); }
async function stance(){ await fetch('/api/stance',{method:'POST'}); }
async function zeroAll(){ if(confirm('Set every servo to raw 0° for assembly reference?')) await fetch('/api/zero',{method:'POST'}); }
async function resetAll(){ if(confirm('Clear all offsets back to 0?')){ const r=await fetch('/api/reset',{method:'POST'}); const j=await r.json(); offsets=j.offsets; build(); } }
async function poll(){
  try{ const s=await (await fetch('/api/state')).json();
    if(s.offsets){offsets=s.offsets;}
    const el=document.getElementById('batt');
    if(s.battery==null){el.textContent='battery: n/a';}
    else{el.textContent='battery: '+s.battery+' V'; el.classList.toggle('low', s.battery<6.8);}
  }catch(e){}
}
(async()=>{ await poll(); build(); setInterval(poll,5000); })();
</script>
</body>
</html>
