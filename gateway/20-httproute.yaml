# Route MCP traffic hitting the gateway's /mcp path to the picrawler MCP backend.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: picrawler-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: picrawler-mcp
          group: agentgateway.dev
          kind: AgentgatewayBackend
